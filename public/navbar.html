<div class='classSearch {{searchdisplay}}'>
	<table width='100%'>
		<tr>
			<td style='width:40px;'>
				<span style="display:inline-block;margin:0px;" class="navbar-brand mb-0 h1">
					<a href='{{basePath}}/'>
						<img src="{{basePath}}/assets/icon.png" width="30" height="30" style="margin-bottom: 2px;"
							class="d-inline-block align-top" alt="">
					</a>
			</td>
			<td>
				<select style="display:inline-block;" name="example" id='search'
					onchange="location.href = '{{basePath}}/class' + this.value.replace('%0A', '');" placeholder="Select a class...">
					<option value='' selected></option>
					{{classes}}
				</select>
			</td>
			<td style='width:40px;padding-left:10px;'>
				<span style="display:inline-block;" class="navbar-brand mb-0 h1"><a
						style="color:white;text-decoration:none;" href="{{basePath}}/about/">About</a></span>
			</td>
			<td style='width:40px;padding-left:10px;'>
				<button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch theme" title="Switch theme">&#9790;</button>
			</td>
		</tr>
	</table>
</div>
